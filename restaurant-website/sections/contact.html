<!-- 
    SECTION: CONTACT
    Path: sections/contact.html
    Usage: Reservation or General Inquiry form.
-->

<section id="contact" class="contact-section">
    <div class="container fade-in">
        <h2 class="section-title">Contact Us</h2>
        <div class="contact-wrapper">
            <div class="contact-info">
                <h3>Location & Hours</h3>
                <p>123 Restaurant Blvd, Food District</p>
                <p>Mon - Sun: 10:00 AM - 11:00 PM</p>
                <p>Phone: (555) 123-4567</p>
            </div>
            
            <form id="contact-form" class="contact-form">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Your Email Address" required>
                <textarea name="message" rows="5" placeholder="How can we help you, or do you have a reservation request?" required></textarea>
                <button type="submit" class="submit-btn btn-primary">Send Message</button>
            </form>
        </div>
    </div>
</section>
